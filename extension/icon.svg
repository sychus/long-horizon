<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- Horizon line -->
  <line x1="16" y1="80" x2="112" y2="80" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <!-- Palace nodes -->
  <circle cx="36" cy="52" r="8" fill="#ba68c8" opacity="0.9"/>
  <circle cx="64" cy="38" r="10" fill="#4fc3f7" opacity="0.9"/>
  <circle cx="92" cy="52" r="8" fill="#81c784" opacity="0.9"/>
  <!-- Tunnels -->
  <line x1="44" y1="52" x2="54" y2="42" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <line x1="74" y1="42" x2="84" y2="50" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <!-- Signal waves below horizon -->
  <path d="M 24 90 Q 44 84, 64 90 Q 84 96, 104 90" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.4"/>
  <path d="M 24 98 Q 44 92, 64 98 Q 84 104, 104 98" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.25"/>
</svg>
